services:
  admin-api:
    build: .
    container_name: admin-api
    restart: unless-stopped
    env_file:
      - .env
    # Localhost uniquement - accessible depuis le VPS et les conteneurs sur web-network
    # Port: HOST_PORT:CONTAINER_PORT (ex: 3009:3000)
    ports:
      - "${ADMIN_API_HOST:-127.0.0.1}:${ADMIN_API_HOST_PORT:-3009}:${ADMIN_API_PORT:-3000}"
    volumes:
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      # Stats VPS : accès aux métriques du HÔTE (pas du conteneur)
      - /proc:/hostproc:ro
      - /:/hostfs:ro
    networks:
      - web-network
    environment:
      - NODE_ENV=production
      - PORT=${ADMIN_API_PORT:-3000}
      - MYSQL_HOST=${MYSQL_HOST:-mysql}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - SCRIPTS_PATH=${SCRIPTS_PATH:-/home/graphandco/monitoring}
      - DOCKER_SOCKET_PATH=${DOCKER_SOCKET_PATH:-/var/run/docker.sock}
      - SCRIPT_TIMEOUT_MS=${SCRIPT_TIMEOUT_MS:-60000}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - WP_CLI_CONTAINER=${WP_CLI_CONTAINER:-wordpress-wpcli}
    cpus: 0.5
    mem_limit: 256m
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  web-network:
    external: true
